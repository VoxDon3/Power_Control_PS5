name: Build PS5 Payload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld
          cd power_control
          make clean
          make
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Payload
          path: power_control/*.elf

