name: Build PS5 Payload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Local Paths
        run: |
          # إنشاء المجلد في المسار الذي يتوقعه Makefile
          mkdir -p ../ps5-payload-sdk
          # نسخ محتويات المكتبة إلى هذا المسار
          cp -r ps5-payload-sdk/* ../ps5-payload-sdk/
          sudo apt-get update && sudo apt-get install -y clang lld

      - name: Compile
        run: |
          cd power_control
          make clean
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Payload
          path: power_control/*.elf
