name: Build PS5 Payload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld

      - name: Compile
        run: |
          # تأكد أن المسار هو المسار الصحيح للمجلد الذي يحتوي على Makefile
          cd power_control
          # تعريف مسار المكتبات لتكون متاحة للمترجم
          export PS5_PAYLOAD_SDK=$(pwd)/../ps5-payload-sdk
          make clean
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Payload
          path: power_control/*.elf
