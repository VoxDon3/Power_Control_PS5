name: Build PS5 Payload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile
        run: |
          sudo apt-get update && sudo apt-get install -y clang lld
          # الانتقال إلى المجلد الذي يحتوي على الكود المصدري
          cd power_control
          # تعريف مسار SDK ليكون داخل المستودع الحالي
          export PS5_PAYLOAD_SDK=$GITHUB_WORKSPACE/ps5-payload-sdk
          make clean
          make

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Payload
          path: power_control/*.elf
